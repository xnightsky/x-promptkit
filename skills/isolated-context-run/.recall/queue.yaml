version: 1
source_ref: skills/isolated-context-run/SKILL.md
fallback_answer: 未明确
scoring:
  "2": 回答正确且关键边界完整
  "1": 方向正确但缺关键限制或表述偏弱
  "0": 回答错误、臆答、遗漏关键限制或答非所问
cases:
  - id: isolated_context.default_priority
    question: isolated-context-run 默认 runner 优先级是什么？
    medium: skill-mechanism
    carrier: isolated-context-run:subagent
    expected:
      must_include:
        - subagent -> self-cli
      must_not_include:
        - codex exec
    score_rule:
      full: 明确答出默认顺序并不跳到具体 CLI
      partial: 只答出部分顺序或未说明限制
      fail: 直接把具体 CLI 当默认 runner
    tags: [selftest]
    source_scope: SKILL.md#default-priority
