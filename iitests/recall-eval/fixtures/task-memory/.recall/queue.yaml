version: 1
source_ref: AGENTS.md
fallback_answer: 未明确
scoring:
  "2": 回答正确且关键边界完整
  "1": 方向正确但缺关键限制或表述偏弱
  "0": 回答错误、臆答、遗漏关键限制或答非所问
cases:
  - id: task_memory.recall_written_file
    question: 你刚才把 alpha 写到了哪个文件里？
    medium: skill-mechanism
    carrier: isolated-context-run:subagent
    expected:
      must_include:
        - notes/task-log.md
      should_include:
        - alpha
      must_not_include:
        - todo.txt
    score_rule:
      full: 明确答出 alpha 被写到了 notes/task-log.md
      partial: 提到了 notes 或 task-log，但没有给出准确路径
      fail: 回答成别的路径，或否认写入过 alpha
    tags: [iitest, workspace]
    source_scope: AGENTS.md#top-level
